<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Registered Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 1rem 0;
            text-align: center;
        }

        header h1 {
            margin-bottom: 1rem;
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        section {
            background: white;
            margin: 2rem 0;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        section h2 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .user-filter {
            background: #ecf0f1;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-group input {
            width: 100%;
            max-width: 400px;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
        }

        .filter-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 1rem;
            transition: background 0.3s;
        }

        .filter-btn:hover {
            background: #2980b9;
        }

        .no-events {
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
            padding: 2rem;
        }

        .user-event-card {
            background: #ecf0f1;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid #27ae60;
            margin-bottom: 1rem;
        }

        .user-event-card h4 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        .user-event-card p {
            margin-bottom: 0.5rem;
            color: #555;
        }

        .user-event-card .registration-date {
            color: #7f8c8d;
            font-size: 0.9rem;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .filter-btn {
                display: block;
                margin: 1rem 0 0 0;
                width: 100%;
                max-width: 400px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>My Registered Events</h1>
    </header>

    <main>
        <section>
            <h2>My Registered Events</h2>
            <div class="user-filter">
                <div class="form-group">
                    <label for="userEmailFilter">Enter your email to view your events:</label>
                    <input type="email" id="userEmailFilter" placeholder="your.email@example.com">
                    <button class="filter-btn" onclick="filterUserEvents()">View My Events</button>
                </div>
            </div>
            <div id="userEventsList">
                <p class="no-events">Please enter your email to view your registered events</p>
            </div>
        </section>
    </main>

    <script>
        // Sample registration data
        let registrations = [
            {
                id: 1,
                name: "John Doe",
                email: "john@example.com",
                event: "Tech Symposium",
                phone: "1234567890",
                date: "12/10/2024"
            },
            {
                id: 2,
                name: "Jane Smith",
                email: "jane@example.com",
                event: "Basketball Tournament",
                phone: "9876543210",
                date: "12/11/2024"
            },
            {
                id: 3,
                name: "John Doe",
                email: "john@example.com",
                event: "Cultural Fest",
                phone: "1234567890",
                date: "12/12/2024"
            }
        ];

        function filterUserEvents() {
            const userEmail = document.getElementById('userEmailFilter').value.trim();
            
            if (!userEmail) {
                alert('Please enter your email address');
                return;
            }
            
            const userRegistrations = registrations.filter(reg => 
                reg.email.toLowerCase() === userEmail.toLowerCase()
            );
            
            const userEventsList = document.getElementById('userEventsList');
            
            if (userRegistrations.length === 0) {
                userEventsList.innerHTML = '<p class="no-events">No events found for this email address</p>';
                return;
            }
            
            let eventsHTML = '';
            userRegistrations.forEach(registration => {
                eventsHTML += `
                    <div class="user-event-card">
                        <h4>${registration.event}</h4>
                        <p><strong>Name:</strong> ${registration.name}</p>
                        <p><strong>Email:</strong> ${registration.email}</p>
                        <p><strong>Phone:</strong> ${registration.phone}</p>
                        <p class="registration-date"><strong>Registered on:</strong> ${registration.date}</p>
                    </div>
                `;
            });
            
            userEventsList.innerHTML = eventsHTML;
        }
    </script>
</body>
</html>
