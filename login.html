<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - College Event Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary-color: #22d3ee;
            --accent-color: #f97316;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --dark-bg: #1e293b;
            --light-bg: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            z-index: -1;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }

        header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .back-home:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .back-home::before {
            content: '←';
            font-size: 1.2rem;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .auth-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .auth-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 2rem;
            background: var(--light-bg);
            padding: 0.5rem;
            border-radius: 16px;
        }

        .auth-tabs button {
            padding: 1rem;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
        }

        .auth-tabs button.active {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            box-shadow: var(--shadow-md);
        }

        .auth-form {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .auth-form.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            background: var(--card-bg);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            transform: translateY(-1px);
        }

        .form-group input:valid {
            border-color: var(--success-color);
        }

        .form-group input:invalid:not(:placeholder-shown) {
            border-color: var(--error-color);
        }

        .auth-submit {
            width: 100%;
            padding: 1.25rem;
            border: none;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .auth-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .auth-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
        }

        .auth-submit:hover::before {
            left: 100%;
        }

        .auth-submit:active {
            transform: translateY(0);
        }

        .auth-msg {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .auth-msg.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .auth-msg.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-color);
        }

        .divider span {
            background: var(--card-bg);
            padding: 0 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            text-align: center;
            padding: 2rem 0;
            border-top: 1px solid var(--border-color);
        }

        footer p {
            font-size: 0.95rem;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .auth-container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🎓 College Event Manager</h1>
        <a href="event-manager-complete.html" class="back-home">Back to Home</a>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Login / Register</h2>
                    <p>Your campus, your events</p>
                </div>
                
                <div class="auth-tabs">
                    <button id="loginBtn" class="active">Login</button>
                    <button id="registerBtn">Register</button>
                </div>
                
                <div id="authMessage" class="auth-msg"></div>

                <!-- Login Form -->
                <div id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    </div>
                    <button class="auth-submit" onclick="login()">Login</button>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="regName">Full Name</label>
                        <input type="text" id="regName" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email Address</label>
                        <input type="email" id="regEmail" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="regRoll">Roll Number</label>
                        <input type="text" id="regRoll" placeholder="Enter your roll number" required>
                    </div>
                    <div class="form-group">
                        <label for="regDept">Department</label>
                        <select id="regDept" required>
                            <option value="">Select Department</option>
                            <option>Computer Science</option>
                            <option>Electronics</option>
                            <option>Electrical</option>
                            <option>EIA</option>
                            <option>Mechanical</option>
                            <option>Civil</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" placeholder="Create a password" required>
                    </div>
                    <button class="auth-submit" onclick="register()">Create Account</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 College Event Manager. All rights reserved.</p>
    </footer>

    <script>
        // Authentication Functions
        let loginBtn = document.getElementById("loginBtn");
        let registerBtn = document.getElementById("registerBtn");
        let loginForm = document.getElementById("loginForm");
        let registerForm = document.getElementById("registerForm");
        let authMessage = document.getElementById("authMessage");

        loginBtn.onclick = function(){
            loginForm.classList.add("active");
            registerForm.classList.remove("active");
            loginBtn.classList.add("active");
            registerBtn.classList.remove("active");
            authMessage.innerHTML = "";
            authMessage.className = "auth-msg";
        }

        registerBtn.onclick = function(){
            registerForm.classList.add("active");
            loginForm.classList.remove("active");
            registerBtn.classList.add("active");
            loginBtn.classList.remove("active");
            authMessage.innerHTML = "";
            authMessage.className = "auth-msg";
        }

        function login(){
            let email = document.getElementById("loginEmail").value;
            let pass = document.getElementById("loginPassword").value;

            if(email=="" || pass==""){
                authMessage.innerHTML="Please fill all fields";
                authMessage.className="auth-msg error";
                return;
            }

            // Store login info in localStorage for main page to use
            localStorage.setItem('currentUserEmail', email);
            
            authMessage.innerHTML="Login Successful! Redirecting to main page...";
            authMessage.className="auth-msg success";
            
            // Redirect to main page after successful login
            setTimeout(() => {
                window.location.href = "event-manager-complete.html";
            }, 1500);
        }

        function register(){
            let name = document.getElementById("regName").value;
            let email = document.getElementById("regEmail").value;
            let roll = document.getElementById("regRoll").value;
            let dept = document.getElementById("regDept").value;
            let pass = document.getElementById("regPassword").value;

            if(name=="" || email=="" || roll=="" || dept=="" || pass==""){
                authMessage.innerHTML="Please fill all fields";
                authMessage.className="auth-msg auth-error";
                return;
            }

            // Store registration info
            const userData = {
                name: name,
                email: email,
                roll: roll,
                department: dept,
                password: pass
            };
            
            localStorage.setItem('currentUser', JSON.stringify(userData));
            localStorage.setItem('currentUserEmail', email);
            
            authMessage.innerHTML="Account Created Successfully! Redirecting to main page...";
            authMessage.className="auth-msg";
            
            // Redirect to main page after successful registration
            setTimeout(() => {
                window.location.href = "event-manager-complete.html";
            }, 1500);
        }

        // Check if user is already logged in
        window.addEventListener('load', function() {
            const currentUser = localStorage.getItem('currentUserEmail');
            if (currentUser) {
                authMessage.innerHTML = "You are already logged in. Redirecting to main page...";
                authMessage.className = "auth-msg";
                setTimeout(() => {
                    window.location.href = "event-manager-complete.html";
                }, 1500);
            }
        });
    </script>
</body>
</html>
