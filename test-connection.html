<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Eventra Backend Connection Test</h1>
    
    <div id="status" class="info">
        <h3>Connection Status: Testing...</h3>
        <p id="statusMessage">Please wait while we test the backend connection...</p>
    </div>

    <h2>API Endpoints Test</h2>
    <button onclick="testConnection()">Test Basic Connection</button>
    <button onclick="testEvents()">Test Events API</button>
    <button onclick="testRegistration()">Test Registration API</button>
    <button onclick="testLogin()">Test Login API</button>
    
    <div id="results">
        <h3>Test Results:</h3>
        <pre id="output">Click buttons above to test different endpoints...</pre>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        
        function updateStatus(type, message) {
            const status = document.getElementById('status');
            const statusMessage = document.getElementById('statusMessage');
            
            status.className = 'status ' + type;
            statusMessage.innerHTML = message;
        }
        
        function log(message) {
            const output = document.getElementById('output');
            const timestamp = new Date().toLocaleTimeString();
            output.textContent += `[${timestamp}] ${message}\n`;
        }
        
        async function testConnection() {
            log('Testing basic connection...');
            try {
                const response = await fetch(`${API_BASE}/test`);
                const result = await response.json();
                
                if (response.ok && result.success) {
                    updateStatus('success', '✅ Backend Connected Successfully!');
                    log(`✅ Connection test passed: ${result.message}`);
                    log(`Timestamp: ${result.timestamp}`);
                } else {
                    updateStatus('error', '❌ Backend returned error');
                    log(`❌ Error: ${result.message}`);
                }
            } catch (error) {
                updateStatus('error', '❌ Backend Connection Failed');
                log(`❌ Connection failed: ${error.message}`);
                log('Make sure Tomcat is running and the backend is deployed at http://localhost:8080/eventra');
            }
        }
        
        async function testEvents() {
            log('Testing Events API...');
            try {
                const response = await fetch(`${API_BASE}/events`);
                const result = await response.json();
                
                if (response.ok && result.success) {
                    log(`✅ Events API working! Found ${result.events.length} events`);
                    result.events.forEach(event => {
                        log(`  - ${event.title} (${event.category}) - ${event.date}`);
                    });
                } else {
                    log(`❌ Events API error: ${result.message}`);
                }
            } catch (error) {
                log(`❌ Events API failed: ${error.message}`);
            }
        }
        
        async function testRegistration() {
            log('Testing Registration API...');
            try {
                const testData = {
                    username: 'testuser' + Date.now(),
                    email: 'test' + Date.now() + '@example.com',
                    password: 'password123',
                    fullName: 'Test User',
                    phone: '1234567890'
                };
                
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams(testData)
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    log(`✅ Registration API working! User created: ${testData.username}`);
                } else {
                    log(`❌ Registration API error: ${result.message}`);
                }
            } catch (error) {
                log(`❌ Registration API failed: ${error.message}`);
            }
        }
        
        async function testLogin() {
            log('Testing Login API...');
            try {
                const loginData = {
                    username: 'admin',
                    password: 'admin123'
                };
                
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams(loginData)
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    log(`✅ Login API working! Logged in as: ${result.user.username}`);
                    log(`  User role: ${result.user.role}`);
                } else {
                    log(`❌ Login API error: ${result.message}`);
                }
            } catch (error) {
                log(`❌ Login API failed: ${error.message}`);
            }
        }
        
        // Auto-test connection on page load
        window.addEventListener('load', testConnection);
    </script>
</body>
</html>
